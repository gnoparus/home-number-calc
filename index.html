<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศาสตร์พลังตัวเลข - บ้านเลขที่มงคล</title>
    <meta name="description" content="คำนวณเลขมงคลจากบ้านเลขที่ของคุณ วิเคราะห์ตามศาสตร์พลังตัวเลข">
    <meta property="og:title" content="ศาสตร์พลังตัวเลข - คำนวณบ้านเลขที่มงคล">
    <meta property="og:description" content="คำนวณเลขมงคลจากบ้านเลขที่ของคุณ วิเคราะห์ตามศาสตร์พลังตัวเลข">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
        }

        .gold-border {
            border: 2px solid;
            border-image: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c) 1;
        }

        .gold-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: #d4af37;
        }

        .card-shadow {
            box-shadow: 0 0 50px rgba(191, 149, 63, 0.15);
        }

        .step-animation {
            animation: slideIn 0.5s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        .gold-shimmer {
            background: linear-gradient(90deg, #bf953f 0%, #fcf6ba 25%, #d4af37 50%, #fcf6ba 75%, #bf953f 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes pulseGlow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            }

            50% {
                box-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
            }
        }

        .result-card {
            animation: pulseGlow 3s ease-in-out infinite;
        }

        .result-card-bg {
            background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 70%);
        }

        #qrcode canvas {
            border-radius: 8px;
        }

        .ornament {
            opacity: 0.15;
        }
    </style>
</head>

<body class="flex flex-col items-center p-3 md:p-10">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KCN677WT" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div
        class="w-full max-w-2xl bg-[#1e293b] rounded-[2rem] md:rounded-[3rem] overflow-hidden card-shadow border border-slate-700">
        <!-- Header -->
        <div class="p-6 md:p-10 text-center border-b border-slate-700 bg-slate-800/50">
            <h1 class="text-3xl md:text-5xl font-black mb-2 md:mb-4 gold-text">ศาสตร์พลังตัวเลข</h1>
            <p class="text-lg md:text-2xl text-slate-300 font-light">วิเคราะห์บ้านเลขที่มงคล</p>
        </div>

        <!-- Input Section -->
        <div class="p-5 md:p-12">
            <div class="mb-6 md:mb-10 text-center">
                <label for="houseNumber"
                    class="block text-slate-400 text-lg md:text-xl mb-3 md:mb-4 font-medium italic">กรอกเลขที่บ้านของคุณ</label>
                <input type="text" id="houseNumber" placeholder="เช่น 123/45"
                    class="w-full text-3xl md:text-5xl font-bold px-4 py-4 md:py-6 rounded-xl md:rounded-2xl bg-slate-900 border-2 border-slate-700 text-yellow-400 text-center focus:border-yellow-500 focus:outline-none transition-all placeholder:text-slate-800">
            </div>

            <button onclick="calculate()"
                class="w-full bg-gradient-to-r from-yellow-700 via-yellow-500 to-yellow-700 hover:from-yellow-600 hover:to-yellow-600 text-slate-900 text-2xl md:text-3xl font-black py-5 md:py-8 rounded-xl md:rounded-2xl transition-all transform active:scale-95 shadow-[0_10px_20px_rgba(0,0,0,0.3)]">
                คำนวณเลขมงคล
            </button>
        </div>

        <!-- Results Display -->
        <div id="resultArea" class="px-5 md:px-8 pb-8 md:pb-12 hidden">
            <div class="h-px bg-slate-700 mb-6 md:mb-10"></div>

            <div id="stepsContainer" class="space-y-4 md:space-y-6 mb-8 md:mb-12">
                <!-- Steps appear here -->
            </div>

            <!-- ============================== -->
            <!-- SHAREABLE RESULT CARD START     -->
            <!-- ============================== -->
            <div id="finalScore" class="hidden">
                <div id="resultCard"
                    class="relative p-[3px] rounded-[1.5rem] md:rounded-[2.5rem] bg-gradient-to-br from-yellow-500 via-yellow-200 to-yellow-600 result-card">
                    <div class="result-card-bg rounded-[calc(1.5rem-3px)] md:rounded-[2.3rem] overflow-hidden">

                        <!-- Card Header — Branding -->
                        <div class="pt-6 pb-3 md:pt-8 md:pb-4 text-center border-b border-yellow-900/30">
                            <p class="text-xs md:text-sm tracking-[0.4em] text-yellow-600/80 font-bold uppercase mb-1">
                                Numerology Analysis</p>
                            <h2 class="text-xl md:text-2xl font-black gold-shimmer">✦ ศาสตร์พลังตัวเลข ✦</h2>
                        </div>

                        <!-- House Number Display -->
                        <div class="px-5 pt-5 pb-2 md:px-8 md:pt-6 md:pb-3 text-center">
                            <p class="text-slate-500 text-xs md:text-sm tracking-widest mb-1">บ้านเลขที่</p>
                            <p id="resultHouseNumber" class="text-2xl md:text-4xl font-black text-white tracking-wider">
                                —</p>
                        </div>

                        <!-- Divider ornament -->
                        <div class="flex items-center justify-center gap-3 py-1">
                            <div class="h-px w-12 md:w-20 bg-gradient-to-r from-transparent to-yellow-700/50"></div>
                            <span class="text-yellow-600/50 text-xs">✦</span>
                            <div class="h-px w-12 md:w-20 bg-gradient-to-l from-transparent to-yellow-700/50"></div>
                        </div>

                        <!-- Lucky Number Result -->
                        <div class="text-center px-5 md:px-8 pb-2">
                            <p class="text-slate-400 text-sm md:text-base mb-0">ผลรวมเลขมงคลคือ</p>
                            <div id="resultDigit"
                                class="text-[7rem] md:text-[10rem] font-black leading-none gold-text my-1 md:my-2 italic">
                                ?</div>
                        </div>

                        <!-- Meaning -->
                        <div
                            class="mx-5 md:mx-8 mb-5 md:mb-6 p-4 md:p-5 rounded-xl md:rounded-2xl bg-slate-800/60 border border-slate-700/50">
                            <p id="resultDesc"
                                class="text-base md:text-xl text-slate-200 leading-relaxed font-medium text-center"></p>
                        </div>

                        <!-- QR Code + Credit Section -->
                        <div
                            class="mx-5 md:mx-8 mb-5 md:mb-6 flex items-center gap-4 md:gap-5 p-4 md:p-5 rounded-xl md:rounded-2xl bg-slate-800/40 border border-slate-700/30">
                            <!-- QR Code -->
                            <div class="flex-shrink-0">
                                <div id="qrcode"
                                    class="bg-white p-1.5 md:p-2 rounded-lg md:rounded-xl w-[72px] h-[72px] md:w-[96px] md:h-[96px] flex items-center justify-center">
                                </div>
                            </div>
                            <!-- Text next to QR -->
                            <div class="flex-1 min-w-0">
                                <p class="text-yellow-500 text-xs md:text-sm font-bold mb-0.5">คำนวณเลขมงคลบ้านคุณ</p>
                                <p id="siteUrlDisplay" class="text-slate-400 text-[10px] md:text-xs truncate mb-2"></p>
                                <div class="h-px bg-slate-700/50 mb-2"></div>
                                <p class="text-slate-500 text-[10px] md:text-xs">
                                    ที่ปรึกษา <span class="text-yellow-600/80 font-semibold">อ.โมเดล & อ.ลิตา</span>
                                </p>
                                <p class="text-slate-600 text-[10px] md:text-xs">
                                    Dev by <span class="text-slate-400 font-semibold">คุณเก่ง</span>
                                </p>
                            </div>
                        </div>

                        <!-- Footer watermark -->
                        <div class="pb-4 md:pb-5 text-center">
                            <p class="text-[9px] md:text-[10px] text-slate-600 tracking-[0.3em]">POWERED BY
                                ศาสตร์พลังตัวเลข</p>
                        </div>

                    </div>
                </div>

                <!-- ============================== -->
                <!-- SHAREABLE RESULT CARD END       -->
                <!-- ============================== -->

                <!-- Share CTA — Outside the card so it's not in screenshots -->
                <div class="mt-8 md:mt-12 text-center">
                    <p class="text-slate-400 text-base md:text-xl font-medium leading-relaxed">📸
                        แคปหน้าจอแล้วส่งให้เพื่อนๆ ดูกัน!<br>
                        <span class="text-slate-500 text-sm md:text-base">ลองเช็คบ้านเลขที่ของคุณเลย ✨</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SITE_URL = window.location.href.split('?')[0].split('#')[0];

        const meanings = {
            "1": "บ้านแห่งผู้นำ: โดดเด่นด้านเกียรติยศ ชื่อเสียง และความเจริญก้าวหน้าในหน้าที่การงาน",
            "2": "บ้านแห่งความรัก: เน้นความเมตตา ผู้อยู่อาศัยมีความสุขทางใจ มีเสน่ห์ และงานบริการเด่น",
            "3": "บ้านแห่งความกระตือรือร้น: มีพลังงานของความกล้าหาญ ขยันขันแข็ง และมักมีชัยชนะในการแข่งขัน",
            "4": "บ้านแห่งสติปัญญา: ส่งเสริมด้านการสื่อสาร การเจรจาธุรกิจ และการค้าขายที่รุ่งเรือง",
            "5": "บ้านแห่งความมั่นคง: เต็มไปด้วยคุณธรรม มีผู้ใหญ่เมตตา และมีสิ่งศักดิ์สิทธิ์คุ้มครองเสมอ",
            "6": "บ้านแห่งศิลปะและโชคลาภ: โดดเด่นด้านความสวยงาม มีเสน่ห์ดึงดูด และเงินทองไหลมาเทมา",
            "7": "บ้านแห่งความอดทน: มีพลังความหนักแน่น มักเกี่ยวข้องกับทรัพย์สินมรดกและความมั่นคงในระยะยาว",
            "8": "บ้านแห่งความมั่งคั่ง: เน้นบารมี โชคลาภก้อนใหญ่ และการขยายธุรกิจให้กว้างไกล",
            "9": "บ้านแห่งความเป็นสิริมงคล: มีพลังงานความร่มเย็น เจริญก้าวหน้าอย่างอัศจรรย์ และมีความคิดสร้างสรรค์"
        };

        let qrGenerated = false;

        function generateQR() {
            const container = document.getElementById('qrcode');
            container.innerHTML = '';
            const isMobile = window.innerWidth < 768;
            const qrSize = isMobile ? 56 : 80;
            new QRCode(container, {
                text: SITE_URL,
                width: qrSize,
                height: qrSize,
                colorDark: "#1e293b",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
            qrGenerated = true;
        }

        async function calculate() {
            const input = document.getElementById('houseNumber').value.trim();
            const container = document.getElementById('stepsContainer');
            const resultArea = document.getElementById('resultArea');
            const finalScore = document.getElementById('finalScore');

            if (!input) return;

            // Reset UI
            container.innerHTML = '';
            resultArea.classList.remove('hidden');
            finalScore.classList.add('hidden');

            // Extraction Logic
            let rawTarget = input.includes('/') ? input.split('/')[1] : input;
            let currentStr = rawTarget.replace(/[^0-9]/g, '');

            if (!currentStr) {
                addStep("ไม่พบตัวเลขที่สามารถคำนวณได้", true);
                return;
            }

            addStep(`วิเคราะห์เลข: <span class="text-yellow-400 font-bold">${currentStr}</span>`);
            await sleep(600);

            let currentSum = 0;

            while (true) {
                let digits = currentStr.split('').map(Number);
                currentSum = digits.reduce((a, b) => a + b, 0);

                let calculationText = digits.join(' + ');
                addStep(`${calculationText} = <span class="text-yellow-400 font-bold">${currentSum}</span>`);
                await sleep(800);

                if (currentSum < 10) break;

                addStep(`ยังไม่ใช่เลขหลักเดียว นำ <span class="text-white">${currentSum}</span> มาบวกต่อ...`);
                currentStr = currentSum.toString();
                await sleep(600);
            }

            // Final Display — populate the result card
            document.getElementById('resultHouseNumber').innerText = input;
            document.getElementById('resultDigit').innerText = currentSum;
            document.getElementById('resultDesc').innerText = meanings[currentSum] || "เป็นเลขที่มีพลังงานบวกมหาศาล";

            // Show website URL text
            const displayUrl = SITE_URL.replace(/^https?:\/\//, '').replace(/\/$/, '');
            document.getElementById('siteUrlDisplay').innerText = displayUrl;

            // Generate QR code
            generateQR();

            finalScore.classList.remove('hidden');
            finalScore.classList.add('step-animation');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function addStep(html, isError = false) {
            const div = document.createElement('div');
            div.className = `step-animation text-lg md:text-2xl p-4 md:p-6 rounded-xl md:rounded-2xl border ${isError ? 'bg-red-900/20 border-red-800 text-red-400' : 'bg-slate-800/50 border-slate-700 text-slate-300'}`;
            div.innerHTML = `✨ ${html}`;
            document.getElementById('stepsContainer').appendChild(div);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }



        document.getElementById('houseNumber').addEventListener('keypress', e => {
            if (e.key === 'Enter') calculate();
        });
    </script>
</body>

</html>
